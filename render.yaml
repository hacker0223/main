services:
  - type: web
    name: summit-pattern-engine
    runtime: python
    # Starter (paid): never spins down. A free instance slept after ~15min
    # idle and cold-started in 50-150s, which made Pattern Lab and the whole
    # app flap on first load. Keep this in sync with the dashboard so a
    # blueprint re-sync can't silently revert it to free.
    plan: starter
    rootDir: apps/pattern-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

  - type: web
    name: summit-api
    runtime: node
    plan: starter # paid: never spins down (see pattern-engine note above)
    # --include=dev is required here: NODE_ENV=production (below) is applied
    # during the build step too, and npm skips devDependencies under
    # NODE_ENV=production by default — but typescript and the @types/*
    # packages needed to actually run `tsc` are devDependencies. Without this
    # flag the build fails with "could not find a declaration file" errors.
    buildCommand: npm install --include=dev && npm run build --workspace=@summit/api
    startCommand: npm run start --workspace=@summit/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: FINNHUB_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PATTERN_ENGINE_URL
        value: https://summit-pattern-engine.onrender.com # confirmed live; not a secret
